name: update-dashboard-data-5

on:
  workflow_dispatch:
  schedule:
    - cron: '47 * * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-data-5.yml'

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build dashboard5 JSON (AMAZON date row + "итого" $ row)
        env:
          GOOGLE_SHEET_ID_5: ${{ vars.GOOGLE_SHEET_ID_5 }}
          GOOGLE_SHEET_GID_5: ${{ vars.GOOGLE_SHEET_GID_5 }}
        run: |
          python - <<'PY'
          import os, csv, json, re, urllib.request
          from io import StringIO
          from datetime import datetime, UTC

          sheet_id = os.environ.get('GOOGLE_SHEET_ID_5') or '1WG-XENqaWzjAv7L-B9lWO9n5tRRvpDzOphSZoTFsrxQ'
          gid = os.environ.get('GOOGLE_SHEET_GID_5') or '1716802263'
          url = f'https://docs.google.com/spreadsheets/d/{sheet_id}/export?format=csv&gid={gid}'
          text = urllib.request.urlopen(url, timeout=90).read().decode('utf-8')
          rows = list(csv.reader(StringIO(text)))

          now = datetime.now(UTC)
          CUR_YEAR, CUR_MONTH = now.year, now.month

          MONTHS = {
              'янв':1,'фев':2,'мар':3,'апр':4,'май':5,'мая':5,'июн':6,'июл':7,
              'авг':8,'сен':9,'окт':10,'ноя':11,'дек':12,
              'jan':1,'feb':2,'mar':3,'apr':4,'may':5,'jun':6,'jul':7,'aug':8,'sep':9,'oct':10,'nov':11,'dec':12,
          }

          def parse_cell_date(v):
              # Full date forms, else a bare day number -> current month/year.
              if v is None: return None
              s = str(v).strip()
              if not s: return None
              m = re.match(r'^(\d{4})-(\d{1,2})-(\d{1,2})', s)
              if m:
                  y, mo, d = int(m.group(1)), int(m.group(2)), int(m.group(3))
              else:
                  m = re.match(r'^(\d{1,2})[.\/](\d{1,2})(?:[.\/](\d{2,4}))?$', s)
                  if m:
                      d, mo = int(m.group(1)), int(m.group(2))
                      y = int(m.group(3)) if m.group(3) else CUR_YEAR
                      if y < 100: y += 2000
                  else:
                      m = re.match(r'^(\d{1,2})\s*([A-Za-zА-Яа-яёЁ]{3,})\.?\s*(\d{4})?$', s)
                      if m:
                          d = int(m.group(1)); mo = MONTHS.get(m.group(2).lower()[:3])
                          y = int(m.group(3)) if m.group(3) else CUR_YEAR
                          if not mo: return None
                      elif re.match(r'^\d{1,2}$', s):
                          d, mo, y = int(s), CUR_MONTH, CUR_YEAR   # bare day -> current month
                      else:
                          return None
              try:
                  if 1 <= mo <= 12 and 1 <= d <= 31:
                      return f'{y:04d}-{mo:02d}-{d:02d}'
              except Exception:
                  pass
              return None

          def num(v):
              if v is None: return None
              if isinstance(v, (int, float)): return float(v)
              s = str(v).strip()
              if not s: return None
              neg = s.startswith('(') and s.endswith(')')
              s = s.replace('\xa0', '').replace(' ', '').replace('$', '').replace('₽', '').replace('(', '').replace(')', '')
              if s.count(',') == 1 and s.count('.') == 0:
                  s = s.replace(',', '.')
              else:
                  s = s.replace(',', '')
              try:
                  val = float(s)
                  return -val if neg else val
              except ValueError:
                  return None

          def norm(s):
              return re.sub(r'\s+', ' ', str(s or '')).strip().lower().rstrip(':').strip()

          def first_cell_norm(r):
              for c in r:
                  s = norm(c)
                  if s:
                      return s
              return ''

          # The sheet stacks one block per month (Январь / Февраль / ... / Май), each with its
          # own AMAZON (dates) and ИТОГО rows. Pick the block for the CURRENT month.
          MONTH_NAMES = {1:'январь',2:'февраль',3:'март',4:'апрель',5:'май',6:'июнь',7:'июль',
                         8:'август',9:'сентябрь',10:'октябрь',11:'ноябрь',12:'декабрь'}
          ALL_MONTHS = set(MONTH_NAMES.values())
          cur_name = MONTH_NAMES[CUR_MONTH]

          month_header_rows = [i for i, r in enumerate(rows) if first_cell_norm(r) in ALL_MONTHS]
          start = next((i for i in month_header_rows if first_cell_norm(rows[i]) == cur_name), None)
          if start is None and month_header_rows:
              start = month_header_rows[-1]          # fallback: latest month block present
          if start is None:
              start = 0
          end = next((i for i in month_header_rows if i > start), len(rows))
          block = range(start, end)

          # within the current-month block: AMAZON = date header, "ИТОГО по AMAZON" = $ totals
          date_idx = next((i for i in block if any(norm(c) == 'amazon' for c in rows[i])), -1)
          total_idx = next((i for i in block if i > date_idx and any(norm(c) == 'итого по amazon' for c in rows[i])), -1)
          if total_idx < 0:
              total_idx = next((i for i in block if i > date_idx and any('итого' in norm(c) for c in rows[i])), -1)

          days = []
          if date_idx >= 0 and total_idx >= 0:
              drow, trow = rows[date_idx], rows[total_idx]
              for j in range(len(drow)):
                  d = parse_cell_date(drow[j])
                  if not d:
                      continue
                  v = num(trow[j]) if j < len(trow) else None
                  if v is None:
                      continue
                  days.append({'date': d, 'revenue': v})

          by_date = {}
          for rec in days:
              by_date[rec['date']] = rec['revenue']
          days = [{'date': k, 'revenue': v} for k, v in sorted(by_date.items())]

          # keep only days that already happened (<= today) and have real (non-zero) sales
          today = now.strftime('%Y-%m-%d')
          days = [d for d in days if d['date'] <= today and d['revenue']]

          payload = {
              'generated_at': now.strftime('%Y-%m-%dT%H:%M:%SZ'),
              'currency': 'USD',
              'source': url,
              'sheet_view': f'https://docs.google.com/spreadsheets/d/{sheet_id}/edit?gid={gid}',
              'current_month': f'{CUR_YEAR:04d}-{CUR_MONTH:02d}',
              'total_label': 'ИТОГО по AMAZON',
              'day_count': len(days),
              'amazon_row_index': date_idx,
              'total_row_index': total_idx,
              'days': days,
          }
          os.makedirs('data', exist_ok=True)
          with open('data/dashboard5.json', 'w', encoding='utf-8') as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          print(f'Wrote {len(days)} days. amazon_row={date_idx}, total_row={total_idx}')
          PY

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard5.json
          if git diff --cached --quiet -- data/dashboard5.json; then
            echo "No changes in dashboard5.json"
            exit 0
          fi
          git commit -m "chore: update dashboard5 data"
          git push
